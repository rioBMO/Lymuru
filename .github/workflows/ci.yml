name: CI

on:
  push:
    branches: [main, refactor/change-download-method]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: bun install
        working-directory: frontend

      - name: Go test
        run: go test ./backend/...

      - name: Wails build
        run: wails build

      - name: Go build
        run: go build ./...
