name: Build Lymuru

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21' # adjust as needed
        cache: true

    - name: Set up Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install NSIS
      run: choco install nsis -y

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Build Wails App (EXE and NSIS Installer)
      run: |
        wails build -nsis
      env:
        CGO_ENABLED: 1

    - name: Rename and ZIP Artifacts
      run: |
        mv build/bin/Lymuru.exe build/bin/Lymuru-Portable.exe
        if (Test-Path build/bin/Lymuru-amd64-installer.exe) {
          mv build/bin/Lymuru-amd64-installer.exe build/bin/Lymuru-Installer.exe
        }
        Compress-Archive -Path build/bin/Lymuru-Portable.exe -DestinationPath build/bin/Lymuru-Windows.zip

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Lymuru-Windows-Builds
        path: |
          build/bin/Lymuru-Portable.exe
          build/bin/Lymuru-Installer.exe
          build/bin/Lymuru-Windows.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/bin/Lymuru-Portable.exe
          build/bin/Lymuru-Installer.exe
          build/bin/Lymuru-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
