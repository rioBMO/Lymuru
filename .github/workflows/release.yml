name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: bun install
        working-directory: frontend

      - name: Set version from tag
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          $json = Get-Content wails.json | ConvertFrom-Json
          $json.info.productVersion = $version
          $json | ConvertTo-Json -Depth 10 | Set-Content wails.json
          Write-Output "Version set to $version"

      - name: Wails build
        run: wails build

      - name: Prepare release files
        run: |
          $dir = "release\Lymuru"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          Copy-Item "build\bin\Lymuru.exe" "$dir\" -Force
          Copy-Item -Recurse "sidecar" "$dir\" -Force
          Copy-Item "README.md" "$dir\" -Force
          Copy-Item "LICENSE" "$dir\" -Force

      - name: Create release zip
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          Compress-Archive -Path "release\Lymuru\*" -DestinationPath "Lymuru-v$version-windows-amd64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: Lymuru-v*-windows-amd64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
