name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: bun install
        working-directory: frontend

      - name: Set version from tag
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          $json = Get-Content wails.json | ConvertFrom-Json
          $json.info.productVersion = $version
          $json | ConvertTo-Json -Depth 10 | Set-Content wails.json
          Write-Output "Version set to $version"

      - name: Wails build
        run: wails build

      - name: Rename binary with version
        run: |
          $tag = "${{ github.ref_name }}"
          Rename-Item "build\bin\Lymuru.exe" "Lymuru-$tag.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: build\bin\Lymuru-v*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
